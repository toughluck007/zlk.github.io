<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../css/zlk-base.css">

<style>
.container {
    padding: 15px;
}

h2 {
    margin-top: 0;
}

.wrapper {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.section {
    border: 2px solid #808080;
    background: #f0f0f0;
    padding: 12px;
}

textarea {
    width: 100%;
    height: 130px;
    padding: 6px;
    border: 2px solid #808080;
    background: white;
    resize: vertical;
    box-sizing: border-box;
}

.buttons {
    margin: 8px 0;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
}

.status {
    font-size: 12px;
    margin-top: 6px;
}
</style>
</head>

<body>

<div class="container">

<h2>BASE64 ENCODE / DECODE TOOL</h2>

<div class="wrapper">

<!-- ENCODE -->
<div class="section">

<strong>Text → Base64</strong>

<textarea id="plainText" placeholder="Enter text to encode..."></textarea>

<div class="buttons">
    <button onclick="encodeText()">Encode</button>
    <button onclick="copyToClipboard('encodedText')">Copy</button>
</div>

<textarea id="encodedText" placeholder="Base64 output..." readonly></textarea>

</div>

<!-- DECODE -->
<div class="section">

<strong>Base64 → Text</strong>

<textarea id="base64Input" placeholder="Enter Base64 to decode..."></textarea>

<div class="buttons">
    <button onclick="decodeText()">Decode</button>
    <button onclick="copyToClipboard('decodedText')">Copy</button>
</div>

<textarea id="decodedText" placeholder="Decoded output..." readonly></textarea>

</div>

</div>

<div class="status">
Tip: Press Enter (without Shift) inside a field to process.
</div>

</div>

<script>

// Encode
function encodeText() {
    const input = document.getElementById('plainText').value;
    try {
        const encoded = btoa(unescape(encodeURIComponent(input)));
        document.getElementById('encodedText').value = encoded;
    } catch (e) {
        document.getElementById('encodedText').value = "Error encoding text.";
    }
}

// Decode
function decodeText() {
    const input = document.getElementById('base64Input').value;
    try {
        const decoded = decodeURIComponent(escape(atob(input)));
        document.getElementById('decodedText').value = decoded;
    } catch (e) {
        document.getElementById('decodedText').value = "Error decoding Base64.";
    }
}

// Copy
function copyToClipboard(id) {
    const text = document.getElementById(id);
    text.select();
    document.execCommand('copy');
}

// Enter triggers
document.getElementById('plainText').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        encodeText();
    }
});

document.getElementById('base64Input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        decodeText();
    }
});

</script>

</body>
</html>
