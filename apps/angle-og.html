<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Livery Angle Calculator</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    h1 {
      font-weight: 300;
      margin-top: 36px;
      letter-spacing: 0.04em;
    }
    .container {
      display: flex;
      flex-direction: row;
      gap: 40px;
      margin-top: 40px;
    }
    .calculator {
      background: #181818;
      border-radius: 18px;
      box-shadow: 0 4px 32px #000a;
      padding: 32px 28px 24px 28px;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-bottom: 0;
    }
    h2 {
      font-weight: 400;
      margin-bottom: 18px;
    }
    label {
      font-size: 1.07rem;
      margin-bottom: 8px;
      color: #ccc;
      width: 100%;
    }
    input[type=number] {
      width: 110px;
      background: #222;
      color: #eee;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 1.18rem;
      margin-bottom: 16px;
      outline: none;
      box-shadow: 0 1px 3px #0004;
      transition: box-shadow 0.18s;
    }
    input[type=number]:focus {
      box-shadow: 0 2px 8px #222a;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      width: 100%;
    }
    button {
      background: #282828;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 400;
      transition: background 0.2s;
      margin-right: 0;
    }
    button:hover {
      background: #444;
    }
    .result {
      font-weight: bold;
      margin-left: 1em;
      font-size: 1.14rem;
      color: #87ffbd;
      letter-spacing: 0.04em;
    }
    p {
      color: #888;
      font-size: 0.97rem;
      margin-top: 10px;
      margin-bottom: 0;
    }
    @media (max-width: 900px) {
      .container {
        flex-direction: column;
        gap: 28px;
      }
      .calculator {
        min-width: 220px;
      }
    }
  </style>
</head>
<body>
  <h1>Livery Angle Calculator</h1>
  <div class="container">
    <div class="calculator">
      <h2>180&deg; Flip</h2>
      <label for="angle180">Original angle (deg):</label>
      <input id="angle180" type="number" step="0.1" placeholder="eg. 37.5">
      <div class="buttons">
        <button onclick="calcFlip()" id="flipBtn">Calculate</button>
        <button onclick="copyResult('result180')">Copy</button>
        <span id="result180" class="result"></span>
      </div>
      <p>This returns the angle to use on the opposite side when the artwork is flipped 180&deg;.</p>
    </div>
    <div class="calculator">
      <h2>90&deg; Rotation</h2>
      <label for="angleRotate">Starting angle (deg):</label>
      <input id="angleRotate" type="number" step="0.1" placeholder="eg. 140">
      <div class="buttons">
        <button onclick="calcRotate()" id="rotateBtn">Calculate</button>
        <button onclick="copyResult('resultRotate')">Copy</button>
        <span id="resultRotate" class="result"></span>
      </div>
      <p>Adds or subtracts 90&deg; based on the starting angle. For 0&ndash;180&deg; add 90&deg;, otherwise subtract 90&deg;.</p>
    </div>
  </div>
  <script>
    // 180 degree flip calculation
    function calcFlip() {
      const angle = parseFloat(document.getElementById('angle180').value) || 0;
      const result = (540 - angle) % 360;
      document.getElementById('result180').textContent = result.toFixed(1) + '°';
    }
    // 90 degree rotate calculation
    function calcRotate() {
      const angle = parseFloat(document.getElementById('angleRotate').value) || 0;
      let result;
      if (angle >= 0 && angle < 180) {
        result = angle + 90;
      } else {
        result = angle - 90;
      }
      result = (result + 360) % 360;
      document.getElementById('resultRotate').textContent = result.toFixed(1) + '°';
    }
    // Copy to clipboard
    function copyResult(id) {
      const text = document.getElementById(id).textContent;
      if (text) {
        navigator.clipboard.writeText(text);
      }
    }
    // Enter key triggers for both calculators
    document.getElementById('angle180').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        calcFlip();
      }
    });
    document.getElementById('angleRotate').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        calcRotate();
      }
    });
  </script>
</body>
</html>
