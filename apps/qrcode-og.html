<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QR Code Generator</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 24px; }
    .wrap { max-width: 780px; margin: 0 auto; }
    .card { border: 1px solid rgba(127,127,127,.35); border-radius: 14px; padding: 18px; }
    label { display: block; margin: 10px 0 6px; font-weight: 600; }
    textarea, input[type="number"], input[type="text"], select {
      width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 10px;
      border: 1px solid rgba(127,127,127,.45); background: transparent; font: inherit;
    }
    textarea { min-height: 92px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 680px) { .row { grid-template-columns: 1fr; } }
    .btns { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    button {
      border: 1px solid rgba(127,127,127,.45); background: rgba(127,127,127,.12);
      padding: 10px 14px; border-radius: 10px; font: inherit; cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    .out { margin-top: 18px; display: grid; grid-template-columns: 170px 1fr; gap: 16px; align-items: start; }
    @media (max-width: 680px) { .out { grid-template-columns: 1fr; } }

    .previewLink { display: inline-block; border-radius: 12px; overflow: hidden; border: 1px solid rgba(127,127,127,.35); }
    #previewImg { display: block; width: 170px; height: 170px; image-rendering: pixelated; background: #fff; }
    .hint { opacity: .75; font-size: 13px; margin-top: 6px; }
    .meta { opacity: .75; font-size: 13px; line-height: 1.4; }
    .ok { color: #2b8a3e; }
    .warn { color: #b25500; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 style="margin:0 0 14px;">QR Code Generator</h1>

    <div class="card">
      <label for="text">Text or link</label>
      <textarea id="text" placeholder="https://example.com   or   any text"></textarea>

      <div class="row">
        <div>
          <label for="size">QR size (px)</label>
          <input id="size" type="number" min="128" max="2048" step="32" value="512" />
          <div class="hint">Tip: 512 is a good default. For print, try 1024+.</div>
        </div>

        <div>
          <label for="ecc">Error correction</label>
          <select id="ecc">
            <option value="L">L (7%)</option>
            <option value="M" selected>M (15%)</option>
            <option value="Q">Q (25%)</option>
            <option value="H">H (30%)</option>
          </select>
          <div class="hint">Higher = more robust, slightly denser QR.</div>
        </div>
      </div>

      <div class="row">
        <div>
          <label for="filename">Filename (optional)</label>
          <input id="filename" type="text" placeholder="qr-code" />
          <div class="hint">Downloads as: <span style="opacity:.8;font-size:13px;">filename-size.png</span></div>
        </div>
        <div>
          <label>&nbsp;</label>
          <div class="btns" style="margin-top:0;">
            <button id="gen">Generate</button>
            <button id="download" disabled>Download PNG</button>
            <button id="clear">Clear</button>
          </div>
        </div>
      </div>

      <div class="out">
        <div>
          <a id="previewLink" class="previewLink" href="#" download style="pointer-events:none;">
            <img id="previewImg" alt="QR preview" />
          </a>
          <div class="hint">Click the preview to download.</div>
        </div>
        <div class="meta" id="status">
          Enter text and hit <b>Generate</b>.
        </div>
      </div>

      <!-- Hidden render target (full-size QR gets created here) -->
      <div id="qr" style="position:absolute; left:-99999px; top:-99999px;"></div>
    </div>
  </div>

  <!-- QRCode.js (qrcodejs) -->
  <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);

    const textEl = $("text");
    const sizeEl = $("size");
    const nameEl = $("filename");
    const eccEl  = $("ecc");
    const genBtn = $("gen");
    const dlBtn  = $("download");
    const clearBtn = $("clear");

    const qrHost = $("qr");
    const previewLink = $("previewLink");
    const previewImg = $("previewImg");
    const statusEl = $("status");

    function sanitizeFilename(s) {
      const base = (s || "qr-code").trim() || "qr-code";
      return base.replace(/[\\\/:*?"<>|]+/g, "-").replace(/\s+/g, "-").slice(0, 80);
    }

    function getEccLevel(letter) {
      // QRCode.CorrectLevel is provided by qrcode.min.js
      switch (letter) {
        case "L": return QRCode.CorrectLevel.L;
        case "M": return QRCode.CorrectLevel.M;
        case "Q": return QRCode.CorrectLevel.Q;
        case "H": return QRCode.CorrectLevel.H;
        default:  return QRCode.CorrectLevel.M;
      }
    }

    function setDownload(dataUrl, filename) {
      previewImg.src = dataUrl;
      previewLink.href = dataUrl;
      previewLink.download = filename;

      previewLink.style.pointerEvents = "auto";
      dlBtn.disabled = false;

      dlBtn.onclick = () => {
        const a = document.createElement("a");
        a.href = dataUrl;
        a.download = filename;
        a.click();
      };
    }

    function generate() {
      const data = textEl.value.trim();
      if (!data) {
        statusEl.innerHTML = `<span class="warn">Nothing to encode.</span> Enter text or a link first.`;
        dlBtn.disabled = true;
        previewLink.style.pointerEvents = "none";
        previewImg.removeAttribute("src");
        return;
      }

      const px = Math.max(128, Math.min(2048, Number(sizeEl.value) || 512));
      sizeEl.value = px;

      // Clear previous QR
      qrHost.innerHTML = "";

      // Build QR (library draws a canvas or img into qrHost)
      new QRCode(qrHost, {
        text: data,
        width: px,
        height: px,
        correctLevel: getEccLevel(eccEl.value)
      });

      // Wait a tick for DOM to populate, then extract PNG
      setTimeout(() => {
        const canvas = qrHost.querySelector("canvas");
        const img = qrHost.querySelector("img");

        const filename = `${sanitizeFilename(nameEl.value)}-${px}.png`;

        if (canvas && canvas.toDataURL) {
          setDownload(canvas.toDataURL("image/png"), filename);
          statusEl.innerHTML = `<span class="ok">Generated.</span><br/>Chars: <b>${data.length}</b> &nbsp;|&nbsp; Size: <b>${px}×${px}</b> px &nbsp;|&nbsp; ECC: <b>${eccEl.value}</b>`;
          return;
        }

        // Some render modes produce an <img> tag
        if (img && img.src) {
          setDownload(img.src, filename);
          statusEl.innerHTML = `<span class="ok">Generated.</span><br/>Chars: <b>${data.length}</b> &nbsp;|&nbsp; Size: <b>${px}×${px}</b> px &nbsp;|&nbsp; ECC: <b>${eccEl.value}</b>`;
          return;
        }

        statusEl.innerHTML = `<span class="warn">Generation failed.</span> Open DevTools → Console for the error.`;
        dlBtn.disabled = true;
        previewLink.style.pointerEvents = "none";
      }, 0);
    }

    genBtn.addEventListener("click", generate);
    sizeEl.addEventListener("change", () => { if (textEl.value.trim()) generate(); });

    textEl.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") generate();
    });

    clearBtn.addEventListener("click", () => {
      textEl.value = "";
      nameEl.value = "";
      qrHost.innerHTML = "";
      dlBtn.disabled = true;
      previewLink.style.pointerEvents = "none";
      previewImg.removeAttribute("src");
      statusEl.textContent = "Enter text and hit Generate.";
    });
  </script>
</body>
</html>
