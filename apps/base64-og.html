<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Base64 Encode/Decode Tool</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      display: flex;
      flex-direction: row;
      gap: 40px;
      margin-top: 40px;
    }
    .section {
      background: #181818;
      padding: 24px 20px 20px 20px;
      border-radius: 18px;
      box-shadow: 0 4px 32px #000a;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 340px;
    }
    textarea {
      width: 300px;
      height: 150px;
      background: #222;
      color: #eee;
      border: none;
      border-radius: 10px;
      padding: 16px;
      resize: vertical;
      font-size: 1.1rem;
      margin-bottom: 10px;
      outline: none;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      width: 100%;
      justify-content: flex-end;
    }
    button {
      background: #282828;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #444;
    }
    h2 {
      font-weight: 400;
      margin-bottom: 14px;
    }
    @media (max-width: 900px) {
      .container {
        flex-direction: column;
        gap: 24px;
      }
    }
  </style>
</head>
<body>
  <h1 style="font-weight:300; margin-top: 20px;">Base64 Encode / Decode Tool</h1>
  <div class="container">
    <!-- Encode Section -->
    <div class="section">
      <h2>Text to Base64</h2>
      <textarea id="plainText" placeholder="Enter text to encode..."></textarea>
      <div class="buttons">
        <button onclick="encodeText()" id="encodeBtn">Encode</button>
        <button onclick="copyToClipboard('encodedText')">Copy</button>
      </div>
      <textarea id="encodedText" placeholder="Base64 output..." readonly></textarea>
    </div>
    <!-- Decode Section -->
    <div class="section">
      <h2>Base64 to Text</h2>
      <textarea id="base64Input" placeholder="Enter Base64 to decode..."></textarea>
      <div class="buttons">
        <button onclick="decodeText()" id="decodeBtn">Decode</button>
        <button onclick="copyToClipboard('decodedText')">Copy</button>
      </div>
      <textarea id="decodedText" placeholder="Decoded output..." readonly></textarea>
    </div>
  </div>
  <script>
    // Encode plain text to Base64
    function encodeText() {
      const input = document.getElementById('plainText').value;
      try {
        const encoded = btoa(unescape(encodeURIComponent(input)));
        document.getElementById('encodedText').value = encoded;
      } catch (e) {
        document.getElementById('encodedText').value = "Error encoding text.";
      }
    }
    // Decode Base64 to plain text
    function decodeText() {
      const input = document.getElementById('base64Input').value;
      try {
        const decoded = decodeURIComponent(escape(atob(input)));
        document.getElementById('decodedText').value = decoded;
      } catch (e) {
        document.getElementById('decodedText').value = "Error decoding Base64.";
      }
    }
    // Copy content to clipboard
    function copyToClipboard(id) {
      const text = document.getElementById(id);
      text.select();
      document.execCommand('copy');
    }
    // Trigger encode on Enter in the encode textarea
    document.getElementById('plainText').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        encodeText();
      }
    });
    // Trigger decode on Enter in the decode textarea
    document.getElementById('base64Input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        decodeText();
      }
    });
  </script>
</body>
</html>
