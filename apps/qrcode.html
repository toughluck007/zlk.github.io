<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../css/zlk-base.css">

<style>
.container {
    padding: 15px;
}

h2 {
    margin-top: 0;
}

.group {
    margin-bottom: 14px;
}

label {
    display: block;
    margin-bottom: 4px;
    font-weight: bold;
}

textarea, input[type="number"], input[type="text"], select {
    width: 100%;
    box-sizing: border-box;
    padding: 6px;
    border: 2px solid #808080;
    background: white;
}

textarea {
    min-height: 80px;
    resize: vertical;
}

.row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.btns {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.preview-box {
    margin-top: 16px;
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 15px;
    align-items: start;
}

#previewImg {
    width: 170px;
    height: 170px;
    background: white;
    border: 2px solid #808080;
    image-rendering: pixelated;
}

.meta {
    font-size: 12px;
}

.ok { color: #006600; }
.warn { color: #990000; }
</style>
</head>

<body>

<div class="container">

<h2>QR CODE GENERATOR</h2>

<div class="group">
    <label for="text">Text or Link</label>
    <textarea id="text" placeholder="https://example.com or any text"></textarea>
</div>

<div class="row group">
    <div>
        <label for="size">QR Size (px)</label>
        <input id="size" type="number" min="128" max="2048" step="32" value="512">
    </div>

    <div>
        <label for="ecc">Error Correction</label>
        <select id="ecc">
            <option value="L">L (7%)</option>
            <option value="M" selected>M (15%)</option>
            <option value="Q">Q (25%)</option>
            <option value="H">H (30%)</option>
        </select>
    </div>
</div>

<div class="row group">
    <div>
        <label for="filename">Filename (optional)</label>
        <input id="filename" type="text" placeholder="qr-code">
    </div>

    <div>
        <label>&nbsp;</label>
        <div class="btns">
            <button id="gen">Generate</button>
            <button id="download" disabled>Download PNG</button>
            <button id="clear">Clear</button>
        </div>
    </div>
</div>

<div class="preview-box">
    <div>
        <a id="previewLink" href="#" download style="pointer-events:none;">
            <img id="previewImg" alt="QR preview">
        </a>
    </div>
    <div class="meta" id="status">
        Enter text and click Generate.
    </div>
</div>

<div id="qr" style="position:absolute; left:-99999px; top:-99999px;"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>

<script>
const $ = (id) => document.getElementById(id);

const textEl = $("text");
const sizeEl = $("size");
const nameEl = $("filename");
const eccEl  = $("ecc");
const genBtn = $("gen");
const dlBtn  = $("download");
const clearBtn = $("clear");

const qrHost = $("qr");
const previewLink = $("previewLink");
const previewImg = $("previewImg");
const statusEl = $("status");

function sanitizeFilename(s) {
  const base = (s || "qr-code").trim() || "qr-code";
  return base.replace(/[\\\/:*?"<>|]+/g, "-").replace(/\s+/g, "-").slice(0, 80);
}

function getEccLevel(letter) {
  switch (letter) {
    case "L": return QRCode.CorrectLevel.L;
    case "M": return QRCode.CorrectLevel.M;
    case "Q": return QRCode.CorrectLevel.Q;
    case "H": return QRCode.CorrectLevel.H;
    default:  return QRCode.CorrectLevel.M;
  }
}

function setDownload(dataUrl, filename) {
  previewImg.src = dataUrl;
  previewLink.href = dataUrl;
  previewLink.download = filename;
  previewLink.style.pointerEvents = "auto";
  dlBtn.disabled = false;

  dlBtn.onclick = () => {
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = filename;
    a.click();
  };
}

function generate() {
  const data = textEl.value.trim();
  if (!data) {
    statusEl.innerHTML = `<span class="warn">Nothing to encode.</span>`;
    dlBtn.disabled = true;
    previewLink.style.pointerEvents = "none";
    previewImg.removeAttribute("src");
    return;
  }

  const px = Math.max(128, Math.min(2048, Number(sizeEl.value) || 512));
  sizeEl.value = px;

  qrHost.innerHTML = "";

  new QRCode(qrHost, {
    text: data,
    width: px,
    height: px,
    correctLevel: getEccLevel(eccEl.value)
  });

  setTimeout(() => {
    const canvas = qrHost.querySelector("canvas");
    const img = qrHost.querySelector("img");

    const filename = `${sanitizeFilename(nameEl.value)}-${px}.png`;

    if (canvas && canvas.toDataURL) {
      setDownload(canvas.toDataURL("image/png"), filename);
      statusEl.innerHTML =
        `<span class="ok">Generated.</span><br>` +
        `Chars: ${data.length} | Size: ${px}px | ECC: ${eccEl.value}`;
      return;
    }

    if (img && img.src) {
      setDownload(img.src, filename);
      statusEl.innerHTML =
        `<span class="ok">Generated.</span><br>` +
        `Chars: ${data.length} | Size: ${px}px | ECC: ${eccEl.value}`;
      return;
    }

    statusEl.innerHTML = `<span class="warn">Generation failed.</span>`;
  }, 0);
}

genBtn.addEventListener("click", generate);
sizeEl.addEventListener("change", () => { if (textEl.value.trim()) generate(); });

textEl.addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") generate();
});

clearBtn.addEventListener("click", () => {
  textEl.value = "";
  nameEl.value = "";
  qrHost.innerHTML = "";
  dlBtn.disabled = true;
  previewLink.style.pointerEvents = "none";
  previewImg.removeAttribute("src");
  statusEl.textContent = "Enter text and click Generate.";
});
</script>

</body>
</html>
